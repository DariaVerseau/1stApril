<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>С 1 АПРЕЛЯ! 🎉</title>

    <!-- МЕТА ДЛЯ ПРЕВЬЮ (чтобы ссылка выглядела как игра) -->
    <meta name="description" content="С 1 апреля!">
    <meta property="og:title" content="RV There Yet? On Steam">
    <meta property="og:description" content="A co-op adventure about driving your Recreational Vehicle home.">
    <meta property="og:type" content="website">
    <meta property="og:image"
        content="https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/3949040/cae24b4ed7f4531be51f0d63f785b7d253f92dc3/header.jpg?t=1766020280">
    <meta property="og:image:width" content="460">
    <meta property="og:image:height" content="215">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1f2e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Motiva Sans', system-ui, -apple-system, sans-serif;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Конфетти-анимация */
        .confetti {
            width: 10px;
            height: 10px;
            background: #ff0;
            position: absolute;
            animation: fall 3s linear forwards;
            z-index: 1;
        }

        @keyframes fall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .container {
            max-width: 550px;
            width: 100%;
            text-align: center;
            animation: fadeInUp 0.8s ease-out;
            position: fixed;
            z-index: 10000;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Карточка */
        .card {
            background: linear-gradient(145deg, #1e1f2c 0%, #171a25 100%);
            border-radius: 48px;
            padding: 40px 30px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(255, 100, 50, 0.3);
            border: 1px solid rgba(255, 100, 50, 0.5);
        }

        /* Анимированный FAK */
        .fak-container {
            margin: 20px 0 30px;
            animation: shake 0.5s ease-in-out infinite;
            transform-origin: center;
        }

        @keyframes shake {

            0%,
            100% {
                transform: rotate(0deg);
            }

            25% {
                transform: rotate(15deg);
            }

            75% {
                transform: rotate(-15deg);
            }
        }

        .fak-svg {
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.5));
            transition: all 0.3s;
        }

        .fak-svg:hover {
            transform: scale(1.05);
        }

        /* Заголовок */
        h1 {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b4a, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 16px;
            text-shadow: 0 2px 10px rgba(255, 107, 74, 0.3);
        }

        .april-date {
            font-size: 20px;
            color: #ffb347;
            background: rgba(255, 180, 71, 0.15);
            display: inline-block;
            padding: 6px 20px;
            border-radius: 60px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* Текст */
        .message {
            background: rgba(10, 14, 23, 0.6);
            border-radius: 28px;
            padding: 24px;
            margin: 25px 0;
            border: 1px solid rgba(255, 107, 74, 0.3);
        }

        .message p {
            color: #e0e5f0;
            font-size: 18px;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .message .big-text {
            font-size: 28px;
            font-weight: bold;
            color: #ff8c5a;
        }

        /* Кнопка */
        .prank-btn {
            background: linear-gradient(90deg, #ff6b4a, #ff8c5a);
            border: none;
            color: white;
            font-weight: bold;
            font-size: 22px;
            padding: 16px 32px;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            font-family: inherit;
            margin: 15px 0;
            box-shadow: 0 5px 20px rgba(255, 107, 74, 0.4);
        }

        .prank-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 30px rgba(255, 107, 74, 0.6);
            cursor: pointer;
        }

        /* Стикерпаки */
        .sticker-pack {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 25px 0;
            font-size: 48px;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .friend-name {
            font-size: 24px;
            color: #ffb347;
            font-weight: bold;
            margin-top: 20px;
            padding: 12px;
            border-top: 1px solid #2d3345;
        }

        .footer {
            font-size: 12px;
            color: #5b6f84;
            margin-top: 20px;
        }

        /* Модальное окно */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .modal-content {
            max-width: 450px;
            width: 90%;
            background: linear-gradient(145deg, #2a1f1a, #1f1510);
            border-radius: 48px;
            padding: 40px 30px;
            text-align: center;
            border: 2px solid #ff6b4a;
            animation: modalPop 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

        @keyframes modalPop {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-content .fak-giant {
            font-size: 100px;
            margin: 20px 0;
            animation: shake 0.3s infinite;
            display: inline-block;
        }

        .modal-content h2 {
            color: #ff8c5a;
            font-size: 36px;
            margin-bottom: 20px;
        }

        .modal-content p {
            color: #e0e5f0;
            font-size: 18px;
            margin: 20px 0;
            line-height: 1.5;
        }

        .close-modal {
            background: #ff6b4a;
            border: none;
            color: white;
            font-size: 20px;
            font-weight: bold;
            padding: 14px 30px;
            border-radius: 60px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: all 0.2s;
        }

        .close-modal:hover {
            background: #ff8c5a;
            transform: scale(1.02);
        }

        @media (max-width: 550px) {
            h1 {
                font-size: 36px;
            }

            .message p {
                font-size: 16px;
            }

            .prank-btn {
                font-size: 18px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card">
            <div class="april-date">
                🎉 1 АПРЕЛЯ 2026 🎉
            </div>

            <h1>
                ТЫ ПОПАЛСЯ!
            </h1>

            <div class="fak-container">
                <img src="fcku.jpg" alt="#" width="100" height="100">
            </div>

            <div class="message">
                <p class="big-text">🤡 РАЗЫГРАН! 🤡</p>
                <p>Никакой бесплатной игры нет.<br>
                    а вот хрен тебе <strong style="color:#ff6b4a; font-size:24px;">🖕</strong></p>
                <p style="font-size: 14px; margin-top: 15px;">🎈 С 1 апреля! 🎈</p>
            </div>

            <button class="prank-btn" id="surpriseBtn">
                🤣 НАЖМИ, ЧТОБЫ УСИЛИТЬ 🤣
            </button>

            <div class="sticker-pack">
                <span>🖕</span>
                <span>😹</span>
                <span>🎉</span>
                <span>🤡</span>
            </div>

            <div class="friend-name">
                хиххихихи
            </div>

            <div class="footer">
                steam://prank/404/fak_u_april
            </div>
        </div>
    </div>

    <script>
        // Создаём конфетти
        let activeConfetti = [];
        let animationActive = true;
        let animationInterval = null;

        function createConfetti() {
            const colors = ['#ff2a0a', '#ff4a2a', '#ff6b4a', '#ffaa33', '#ffdd44', '#ffee66', '#4cff4a', '#2affaa', '#44aaff', '#ff4aff', '#ff6ac4', '#ff3366', '#ff8844', '#ffaa88', '#ffffff', '#ffffaa'];

            // Количество конфетти за один залп
            const count = 150;

            for (let i = 0; i < count; i++) {
                const confetti = document.createElement('div');

                // Случайная позиция по ширине (от 0 до 100%)
                const leftPos = Math.random() * 100;

                // ВСЕ конфетти начинают с ВЕРХА экрана (никаких задержек)
                const topPos = -70;

                // Случайный размер (от 6px до 18px)
                const size = Math.random() * 12 + 6;

                // Длительность падения (от 3 до 5 секунд)
                const duration = Math.random() * 2 + 2;

                // БЕЗ ЗАДЕРЖКИ - все начинают падать сразу
                const delay = 0;

                // Случайный цвет
                const color = colors[Math.floor(Math.random() * colors.length)];

                // Случайная форма (квадрат или круг)
                const shape = Math.random() > 0.3 ? 'border-radius: 2px;' : 'border-radius: 50%;';

                // Случайное вращение в конце
                const rotateEnd = Math.random() * 720 + 180;

                confetti.style.cssText = `
            position: fixed;
            top: ${topPos}px;
            left: ${leftPos}%;
            width: ${size}px;
            height: ${size}px;
            background: ${color};
            pointer-events: none;
            z-index: 9999;
            opacity: 0.95;
            ${shape}
            box-shadow: 0 0 3px rgba(255,255,200,0.5);
            transform: rotate(${Math.random() * 360}deg);
            animation: confettiFall ${duration}s linear forwards;
        `;

                // Добавляем индивидуальную анимацию для каждой конфетти
                const styleId = `confetti-anim-${Date.now()}-${i}`;
                const keyframes = `
            @keyframes ${styleId} {
                0% {
                    transform: translateY(0) rotate(0deg);
                    opacity: 1;
                }
                100% {
                    transform: translateY(${window.innerHeight + 100}px) rotate(${rotateEnd}deg);
                    opacity: 0;
                }
            }
        `;

                const styleSheet = document.createElement('style');
                styleSheet.textContent = keyframes;
                document.head.appendChild(styleSheet);

                confetti.style.animation = `${styleId} ${duration}s linear forwards`;

                document.body.appendChild(confetti);
                activeConfetti.push(confetti);

                // Удаляем после анимации
                setTimeout(() => {
                    if (confetti && confetti.remove) {
                        confetti.remove();
                        // Удаляем стиль анимации
                        if (styleSheet && styleSheet.remove) styleSheet.remove();
                        // Удаляем из массива активных конфетти
                        const index = activeConfetti.indexOf(confetti);
                        if (index > -1) {
                            activeConfetti.splice(index, 1);
                        }
                        // Проверяем, все ли конфетти закончились
                        if (animationActive === false && activeConfetti.length === 0) {
                            console.log('Все конфетти упали!');
                            if (animationInterval) clearInterval(animationInterval);
                        }
                    }
                }, duration * 1000);
            }
        }

        // Запускаем непрерывный поток конфетти
        function startContinuousConfetti() {
            // Первая волна
            createConfetti();

            // Создаём интервал для постоянного добавления новых конфетти
            animationInterval = setInterval(() => {
                if (animationActive) {
                    createConfetti();
                }
            }, 500); // Каждые 0.5 секунды новая волна

            // Через 5 секунд прекращаем создавать новые конфетти
            setTimeout(() => {
                animationActive = false;
                console.log('Прекращаем создавать новые конфетти, ждём пока упадут последние...');
            }, 4000);
        }

        // Добавляем базовый стиль для анимации на случай, если что-то пойдёт не так
        const baseStyle = document.createElement('style');
        baseStyle.textContent = `
    @keyframes fallBase {
        0% {
            transform: translateY(0) rotate(0deg);
            opacity: 1;
        }
        100% {
            transform: translateY(100vh) rotate(720deg);
            opacity: 0;
        }
    }
`;
        document.head.appendChild(baseStyle);

        // Запускаем при загрузке страницы
        window.addEventListener('load', () => {
            // Небольшая задержка для корректного определения высоты экрана
            setTimeout(() => {
                startContinuousConfetti();
            }, 100);
        });

        // Кнопка с сюрпризом
        const btn = document.getElementById('surpriseBtn');
        let clickCount = 0;

        btn.addEventListener('click', () => {
            clickCount++;

            // Создаём модальное окно
            const modal = document.createElement('div');
            modal.className = 'modal';

            const modalContent = document.createElement('div');
            modalContent.className = 'modal-content';

            // Разный контент в зависимости от количества кликов
            if (clickCount === 1) {
                modalContent.innerHTML = `
                <div class="fak-giant">🖕😹🖕</div>
                <h2>ЭПИЧНЫЙ ФАК!</h2>
                <p>Ты думал, тут будет игра?<br>
                <strong style="font-size: 24px; color:#ff6b4a;">А ВОТ ХРЕН!</strong></p>
                <p>С 1 апреля! Жду ответочку</p>
                <button class="close-modal">✌️ ПРИНЯЛ ✌️</button>
            `;
            } else if (clickCount === 2) {
                modalContent.innerHTML = `
                <div style="font-size: 80px;">🚐🖕🤡</div>
                <h2>RV There Yet? FAK Edition</h2>
                <p>Игра, которую ты никогда не получишь бесплатно 😂<br></p>
                <p style="font-size: 14px;">P.S. Можешь купить игру, она рил прикольная!</p>
                <button class="close-modal">🎮 ЛАДНО, КУПЛЮ 🎮</button>
            `;
            } else {
                modalContent.innerHTML = `
                <div style="font-size: 100px;">🖕🖕🖕</div>
                <h2>ХВАТИТ ЖАТЬ!</h2>
                <p>Ты уже получил максимальный 🖕.<br>
                Поздравляю, ты официально разыгран!</p>
                <p style="color:#ffb347;">🎉 С 1 АПРЕЛЯ, ЧУВАК! 🎉</p>
                <button class="close-modal">😭 СДАЮСЬ 😭</button>
            `;
            }

            modal.appendChild(modalContent);
            document.body.appendChild(modal);

            // Добавляем конфетти при открытии модалки
            createConfetti();

            // Закрытие модального окна
            const closeBtn = modalContent.querySelector('.close-modal');
            closeBtn.addEventListener('click', () => {
                modal.remove();
                // Ещё конфетти для радости
                createConfetti();
            });

            // Клик по фону тоже закрывает
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.remove();
                    createConfetti();
                }
            });

            // Меняем текст на кнопке после первого клика
            if (clickCount === 1) {
                btn.textContent = '😹 А ТЕПЕРЬ ЖМИ ЕЩЁ! 😹';
                btn.style.background = "linear-gradient(90deg, #ff8c5a, #ffaa6a)";
            } else if (clickCount === 2) {
                btn.textContent = '🖕 НУ ДАВАЙ, ЖМИ ЕЩЁ РАЗ 🖕';
                btn.style.background = "linear-gradient(90deg, #ff5a3a, #ff7a5a)";
            } else {
                btn.textContent = '🤡 ВСЁ, ТЫ ПОБЕЖДЁН! 🤡';
                btn.style.background = "linear-gradient(90deg, #ff3a2a, #ff5a3a)";
                btn.disabled = false;
            }
        });

        // Добавляем рандомные плавающие эмодзи
        setInterval(() => {
            const emojis = ['🖕', '😂', '🎉', '🤡', '🚐', '🤣', '😹', '💀'];
            const emoji = document.createElement('div');
            emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            emoji.style.position = 'fixed';
            emoji.style.left = Math.random() * 100 + '%';
            emoji.style.bottom = '-50px';
            emoji.style.fontSize = Math.random() * 30 + 20 + 'px';
            emoji.style.opacity = '0.7';
            emoji.style.zIndex = '999';
            emoji.style.pointerEvents = 'none';
            emoji.style.animation = 'fall 3s linear forwards';
            document.body.appendChild(emoji);

            setTimeout(() => {
                emoji.remove();
            }, 3000);
        }, 800);
    </script>

</body>

</html>
